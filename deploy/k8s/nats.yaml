apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: lobsterroll
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          args: ["-js"] # enable JetStream for durable event buffering
          ports:
            - containerPort: 4222
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: lobsterroll
spec:
  selector:
    app: nats
  ports:
    - port: 4222
      targetPort: 4222
