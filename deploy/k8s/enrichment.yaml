apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: enrichment-data
  namespace: lobsterroll
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: enrichment
  namespace: lobsterroll
spec:
  replicas: 1 # SQLite single-writer cache: never scale > 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: enrichment
  template:
    metadata:
      labels:
        app: enrichment
    spec:
      containers:
        - name: enrichment
          image: lobsterroll/enrichment:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: lobsterroll-config
          env:
            - name: ENRICHMENT_GRPC_ADDR # bind (overrides the dial value in the ConfigMap)
              value: ":50052"
            - name: ENRICHMENT_DB_PATH
              value: /data/enrichment.db
          ports:
            - containerPort: 50052
          livenessProbe:
            tcpSocket:
              port: 50052
            initialDelaySeconds: 5
            periodSeconds: 15
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: enrichment-data
---
apiVersion: v1
kind: Service
metadata:
  name: enrichment
  namespace: lobsterroll
spec:
  selector:
    app: enrichment
  ports:
    - port: 50052
      targetPort: 50052
