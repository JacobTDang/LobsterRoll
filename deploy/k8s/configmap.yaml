apiVersion: v1
kind: ConfigMap
metadata:
  name: lobsterroll-config
  namespace: lobsterroll
data:
  # ---- bus ----
  NATS_URL: "nats://nats:4222"

  # ---- gRPC dial addresses (consumers dial these Services; the owning service
  # overrides its own var to a bind address ":<port>" in its Deployment) ----
  LEADERBOARD_GRPC_ADDR: "leaderboard:50051"
  ENRICHMENT_GRPC_ADDR: "enrichment:50052"

  # ---- enrichment ----
  ENRICHMENT_CACHE_TTL: "24h" # re-fetch cached market metadata older than this (0 = never)

  # ---- leaderboard: track top consistent winners, refresh daily ----
  LEADERBOARD_WINDOW: "30d"
  LEADERBOARD_METRIC: "pnl"
  LEADERBOARD_TOP_N: "30" # max tracked; strict gates below may yield fewer
  STATS_REFRESH_INTERVAL: "24h"
  # Strict quality gates — a wallet must clear ALL to be tracked:
  STATS_MIN_WIN_RATE: "0.90"        # >=90% win rate over resolved markets
  STATS_MIN_PORTFOLIO_USD: "100000" # >=$100k portfolio
  STATS_MIN_RESOLVED: "20"          # >=20 resolved markets (so 90% is meaningful)
  STATS_MIN_REALIZED_PNL: "0"       # raise to require proven net profit
  STATS_REQUIRE_FRESH: "true"       # drop cooling-off wallets from the watchset
  SKILL_SHRINKAGE_K: "200"          # ~resolved markets before a wallet's own ROI outweighs the prior
  CANDIDATE_TOPK: "50"
  STATS_MAX_CANDIDATES: "100"
  STATS_CONCURRENCY: "8"

  # ---- pricewatch (live CLV capture) ----
  PRICEWATCH_POLL_INTERVAL: "2m"  # snapshot every tracked token this often
  PRICEWATCH_TOKEN_TTL: "48h"     # stop polling a token untraded this long (market resolved)
  PRICEWATCH_RETENTION: "720h"    # prune price snapshots older than this (30d)

  # ---- consensus ----
  CONSENSUS_MIN_WALLETS: "3"
  CONSENSUS_WINDOW: "6h"

  # ---- notifier ----
  ALERT_DEDUP_TTL: "24h"  # suppress re-emits of the exact same fill for this long
  ALERT_COOLDOWN: "15m"   # collapse a whale's repeated trades on one market+side; 0 = off

  # ---- execution policy + risk caps (trader) ----
  EXECUTION_MODE: "approval"
  MAX_USD_PER_TRADE: "25"
  MAX_USD_PER_DAY: "200"
  MAX_OPEN_EXPOSURE_USD: "500"
  # Trader wallet model (addresses are not secret; the private key is — see Secret).
  TRADER_SIGNATURE_TYPE: "1" # 1 proxy | 2 gnosis | 0 EOA
  # TRADER_MAKER_ADDRESS / TRADER_FUNDER_ADDRESS: set when you wire the trader.
