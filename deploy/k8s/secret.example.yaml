# TEMPLATE ONLY. Copy to deploy/k8s/secrets/secret.yaml (gitignored), fill in,
# and apply separately:  kubectl apply -f deploy/k8s/secrets/secret.yaml
# Never commit real values. TRADER_PRIVATE_KEY controls real funds.
#
# Minimum to run the US-safe pipeline (watch -> alert -> approve):
#   RPC_WSS_URL, TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
# The POLYMARKET_* + TRADER_PRIVATE_KEY are only needed once you scale up trader.
apiVersion: v1
kind: Secret
metadata:
  name: lobsterroll-secrets
  namespace: lobsterroll
type: Opaque
stringData:
  RPC_WSS_URL: "" # wss://polygon-mainnet.g.alchemy.com/v2/<key>
  TELEGRAM_BOT_TOKEN: ""
  TELEGRAM_CHAT_ID: ""
  # --- trader only (real money; leave blank until you scale trader to 1) ---
  POLYMARKET_API_KEY: ""
  POLYMARKET_API_SECRET: ""
  POLYMARKET_API_PASSPHRASE: ""
  TRADER_PRIVATE_KEY: ""
