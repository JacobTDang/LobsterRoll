apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: consensus-data
  namespace: lobsterroll
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consensus
  namespace: lobsterroll
spec:
  replicas: 1 # the sliding-window SQLite state is shared: never scale > 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: consensus
  template:
    metadata:
      labels:
        app: consensus
    spec:
      containers:
        - name: consensus
          image: lobsterroll/consensus:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: lobsterroll-config # NATS_URL + CONSENSUS_MIN_WALLETS + CONSENSUS_WINDOW
          env:
            - name: CONSENSUS_DB_PATH
              value: /data/consensus.db
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: consensus-data
