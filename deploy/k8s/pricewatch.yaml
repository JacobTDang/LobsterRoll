apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pricewatch-data
  namespace: lobsterroll
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pricewatch
  namespace: lobsterroll
spec:
  replicas: 1 # SQLite single-writer: never scale > 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pricewatch
  template:
    metadata:
      labels:
        app: pricewatch
    spec:
      containers:
        - name: pricewatch
          image: lobsterroll/pricewatch:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: lobsterroll-config # NATS_URL + PRICEWATCH_* knobs
          env:
            - name: PRICEWATCH_DB_PATH
              value: /data/pricewatch.db
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pricewatch-data
