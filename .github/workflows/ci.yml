name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - uses: bufbuild/buf-setup-action@v1
      - name: generate protos
        run: buf generate
      - name: vet
        run: go vet ./...
      - name: test (race)
        run: go test -race ./...
      - name: build all services
        run: |
          for s in leaderboard watcher enrichment strategy trader notifier; do
            echo ">> $s"
            CGO_ENABLED=0 go build -o /dev/null ./services/$s
          done

  proto-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
      - run: buf lint
