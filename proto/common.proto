syntax = "proto3";

package lobsterroll.v1;

option go_package = "github.com/JacobTDang/LobsterRoll/gen/go/lobsterroll/v1;lobsterrollv1";

// Side of a trade from the watched wallet's perspective.
enum Side {
  SIDE_UNSPECIFIED = 0;
  SIDE_BUY = 1;
  SIDE_SELL = 2;
}

// Trade is a single OrderFilled observed on-chain for a watched wallet.
message Trade {
  string wallet = 1;            // proxy wallet (maker/taker)
  string token_id = 2;          // ERC1155 position id
  Side side = 3;
  string price = 4;             // decimal string (USDC per share)
  string size = 5;              // decimal string (shares)
  string tx_hash = 6;
  uint64 log_index = 7;
  uint64 block_number = 8;
  int64 observed_at_unix = 9;
}
