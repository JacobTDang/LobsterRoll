syntax = "proto3";

package lobsterroll.v1;

option go_package = "github.com/JacobTDang/LobsterRoll/gen/go/lobsterroll/v1;lobsterrollv1";

// Leaderboard owns the set of wallets to watch (top-N from Polymarket's
// leaderboard plus any pinned wallets).
service Leaderboard {
  rpc GetWatchset(GetWatchsetRequest) returns (GetWatchsetResponse);
  rpc StreamWatchset(StreamWatchsetRequest) returns (stream WatchsetUpdate);
  // GetWalletStats returns our cached consistency stats for a wallet.
  rpc GetWalletStats(GetWalletStatsRequest) returns (WalletStats);
}

message GetWalletStatsRequest {
  string wallet = 1;
}

// WalletStats are the consistency metrics we compute from data-api /activity and
// cache. found=false when we have no computed stats for the wallet yet.
message WalletStats {
  string wallet = 1;
  double win_rate = 2; // 0..1 over resolved markets
  int64 resolved_markets = 3;
  double realized_pnl = 4;
  double profit_30d = 5;
  double portfolio_value = 6;
  int64 traded_markets = 7;
  int64 computed_unix = 8; // 0 if not yet computed
  bool found = 9;
  double roi = 10; // realized profit / capital deployed (the edge metric)
  int64 skill_score = 11; // 0-100 percentile by shrunk ROI within the tracked pool
  bool fresh = 12; // false = cooling off (recent downward regime)
}

message GetWatchsetRequest {}

message GetWatchsetResponse {
  repeated string wallets = 1;
  // Unix seconds of the last successful leaderboard sync; 0 if the service has
  // not yet completed one. Lets clients detect a stale watchset.
  int64 last_synced_unix = 2;
}

message StreamWatchsetRequest {}

// WatchsetUpdate is emitted whenever the tracked set changes.
message WatchsetUpdate {
  repeated string added = 1;
  repeated string removed = 2;
}
